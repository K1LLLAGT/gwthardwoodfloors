# /etc/nginx/sites-available/gwthardwoodfloors.com
# GWT Hardwood Floors — static site server block
# After editing: sudo ln -s this file into sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`

# ---- Redirect www -> root (canonical, non-www) -----------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.gwthardwoodfloors.com;
    return 301 http://gwthardwoodfloors.com$request_uri;
}

# ---- Main site -------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name gwthardwoodfloors.com;

    # Where the static files live (rsync/scp your build here)
    root /var/www/gwthardwoodfloors.com;
    index index.html;

    # Clean URLs: try the exact file, then .html, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache static assets aggressively; HTML stays fresh
    location ~* \.(css|js|woff2?|ttf|png|jpe?g|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Friendly 404 (optional — create 404.html to use)
    error_page 404 /404.html;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}

# ---------------------------------------------------------------------------
# HTTPS: the easiest path is Certbot, which rewrites this file for you:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d gwthardwoodfloors.com -d www.gwthardwoodfloors.com
# Certbot adds the listen 443 / ssl_certificate lines and an HTTP->HTTPS redirect.
